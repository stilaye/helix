name: HELIX Nightly — Full Suite

# Run nightly at 02:00 UTC on main branch.
# Also manually triggerable with suite selection.
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      suites:
        description: "Suites to run (comma-separated: functional,perf,chaos,integration)"
        required: false
        default: "functional,perf,chaos,integration"
        type: string
      update_baselines:
        description: "Update performance baselines"
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  HELIX_ENV: lab

jobs:
  # ─── Job 1: Functional + Integration ─────────────────────────────────────
  functional:
    name: Functional & Integration
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: contains(fromJson('["functional", "all"]'), inputs.suites || 'functional') ||
        github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install HELIX
        run: pip install -e ".[test]"

      - name: Run functional + integration tests
        env:
          HELIOS_API_KEY: ${{ secrets.HELIOS_API_KEY }}
          CLUSTER_IP: ${{ vars.LAB_CLUSTER_IP }}
          CLUSTER_ID: ${{ vars.LAB_CLUSTER_ID }}
          CLUSTER_NODE_IPS: ${{ vars.LAB_NODE_IPS }}
          SSH_USER: ${{ vars.SSH_USER }}
          NFS_EXPORT: ${{ vars.NFS_EXPORT }}
          SMB_SHARE: ${{ vars.SMB_SHARE }}
          SMB_USER: ${{ secrets.SMB_USER }}
          SMB_PASSWORD: ${{ secrets.SMB_PASSWORD }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: |
          mkdir -p allure-results
          pytest \
            -m "regression and not perf and not chaos" \
            --cluster-ip="${CLUSTER_IP}" \
            --cluster-id="${CLUSTER_ID}" \
            --env=lab \
            -n 4 \
            --tb=short \
            -ra \
            --timeout=300 \
            --alluredir=allure-results \
            -v \
            tests/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-functional
          path: allure-results/
          retention-days: 30

  # ─── Job 2: Performance ────────────────────────────────────────────────────
  performance:
    name: Performance Baselines
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: contains(fromJson('["perf", "all"]'), inputs.suites || 'perf') ||
        github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install HELIX
        run: pip install -e ".[test]"

      - name: Run performance suite
        env:
          HELIOS_API_KEY: ${{ secrets.HELIOS_API_KEY }}
          CLUSTER_IP: ${{ vars.LAB_CLUSTER_IP }}
          CLUSTER_ID: ${{ vars.LAB_CLUSTER_ID }}
          CLUSTER_NODE_IPS: ${{ vars.LAB_NODE_IPS }}
          NFS_EXPORT: ${{ vars.NFS_EXPORT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: |
          mkdir -p allure-results
          UPDATE_FLAG=""
          if [ "${{ inputs.update_baselines }}" = "true" ]; then
            UPDATE_FLAG="--update-baselines"
          fi
          pytest \
            -m perf \
            --cluster-ip="${CLUSTER_IP}" \
            --cluster-id="${CLUSTER_ID}" \
            --env=lab \
            ${UPDATE_FLAG} \
            --tb=short \
            -ra \
            --timeout=600 \
            --alluredir=allure-results \
            -v \
            tests/performance/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-performance
          path: allure-results/
          retention-days: 30

  # ─── Job 3: Chaos (runs after functional to ensure cluster is healthy first)
  chaos:
    name: Chaos & Fault Injection
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [functional]
    if: |
      (contains(fromJson('["chaos", "all"]'), inputs.suites || 'chaos') ||
       github.event_name == 'schedule') &&
      always() && needs.functional.result != 'failure'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install HELIX
        run: pip install -e ".[test]"

      - name: Run chaos suite (fault injection)
        env:
          HELIOS_API_KEY: ${{ secrets.HELIOS_API_KEY }}
          CLUSTER_IP: ${{ vars.LAB_CLUSTER_IP }}
          CLUSTER_ID: ${{ vars.LAB_CLUSTER_ID }}
          CLUSTER_NODE_IPS: ${{ vars.LAB_NODE_IPS }}
          SSH_USER: ${{ vars.SSH_USER }}
          NFS_EXPORT: ${{ vars.NFS_EXPORT }}
          HELIX_ENV: lab
        run: |
          mkdir -p allure-results
          pytest \
            -m "chaos and destructive" \
            --cluster-ip="${CLUSTER_IP}" \
            --cluster-id="${CLUSTER_ID}" \
            --env=lab \
            --tb=long \
            -ra \
            --timeout=300 \
            --alluredir=allure-results \
            -v \
            -p no:randomly \
            tests/chaos/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-chaos
          path: allure-results/
          retention-days: 30

  # ─── Job 4: Merge Allure Reports ──────────────────────────────────────────
  report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [functional, performance, chaos]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: all-results/
          merge-multiple: true

      - name: Install Allure CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/allure-framework/allure2/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate combined Allure report
        run: |
          allure generate all-results/ --clean -o allure-report/

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-nightly-${{ github.run_number }}
          path: allure-report/
          retention-days: 90
