[tool:pytest]
addopts =
    --strict-markers
    --tb=short
    -ra
    --timeout=300
    --import-mode=importlib

markers =
    smoke: Fast gate tests — run on every PR, must pass in <10 min
    regression: Full functional suite — run nightly
    functional: Functional correctness tests
    perf: Performance baseline tests — run nightly with baseline comparison
    chaos: Fault injection and resilience tests — requires healthy lab cluster
    integration: Cross-protocol and end-to-end Helios API tests
    smb: Tests requiring SMB share access
    nfs: Tests requiring NFS mount
    s3: Tests requiring S3 endpoint
    iscsi: Tests requiring iSCSI target
    slow: Tests expected to take longer than 5 minutes
    destructive: Tests that kill nodes or inject faults — requires --env=lab

testpaths = tests
